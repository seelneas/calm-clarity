name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  flutter-tests:
    name: Flutter Unit and Widget Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.6
          channel: stable
          cache: true

      - name: Disable Flutter analytics in CI
        run: flutter config --no-analytics --no-cli-animations

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter unit and widget tests
        run: |
          flutter test test/services/ai_admin_service_test.dart \
            test/screens/observability_dashboard_screen_test.dart \
            test/widget_test.dart



