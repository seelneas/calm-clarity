name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend pytest suite
        working-directory: backend
        run: python -m pytest -q

  flutter-tests:
    name: Flutter Unit and Widget Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.6
          channel: stable
          cache: true

      - name: Disable Flutter analytics in CI
        run: flutter config --no-analytics --no-cli-animations

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter unit and widget tests
        run: |
          flutter test test/services/ai_admin_service_test.dart \
            test/screens/observability_dashboard_screen_test.dart \
            test/widget_test.dart

  flutter-integration-tests:
    name: Flutter Integration Tests (Android Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: flutter-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.6
          channel: stable
          cache: true

      - name: Disable Flutter analytics in CI
        run: flutter config --no-analytics --no-cli-animations

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Free disk space before emulator setup
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo docker image prune -af || true
          df -h

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build Android APK (Pre-warm)
        run: |
          flutter build apk --debug

      - name: Run integration test on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          force-avd-creation: false
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none
          script: |
            flutter doctor -v
            echo "Waiting for emulator to be ready..."
            adb wait-for-device
            # Ensure the emulator is actually booted
            for i in {1..30}; do
              BOOT_COMPLETED=$(adb shell getprop sys.boot_completed | tr -d '\r')
              if [ "$BOOT_COMPLETED" == "1" ]; then
                echo "Emulator boot completed!"
                break
              fi
              echo "Waiting for boot completion... ($i/30)"
              sleep 10
            done
            # Unlock the screen
            adb shell input keyevent 82
            echo "Emulator is ready. Running tests..."
            flutter test integration_test/observability_e2e_test.dart -d android --no-enable-impeller --reporter expanded --timeout 40m



